# BASE compose file. Production-safe by itself: only SAM + Postgres.
#
# Always combine with at least one override:
#
#   Development (mail capture + Sabre/DAV):
#     docker compose -f docker-compose.yml -f deploy/compose.dev.yml up --build
#
#   Production (hardening, no host ports, restart=always):
#     docker compose -f docker-compose.yml -f deploy/compose.production.yml up -d --build
#
#   Production with externally-deployed Mailcow on the same host:
#     docker compose -f docker-compose.yml \
#                    -f deploy/compose.production.yml \
#                    -f deploy/compose.with-external-mailcow.yml \
#                    up -d --build
#
# The split keeps each lifecycle (SAM, dev fixtures, Mailcow) on its
# own update cadence — Mailcow's monthly update.sh never touches SAM.
#
# See docs/installation.md and docs/deployment-mailcow.md for the full
# decision matrix.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sam}
      POSTGRES_USER: ${POSTGRES_USER:-sam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - sam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sam:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TENANT_CONFIG: /etc/sam/tenant.config.json
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # SMTP2GO (only needed when modules.smtp2go.enabled = true)
      SMTP2GO_USER: ${SMTP2GO_USER:-}
      SMTP2GO_PASSWORD: ${SMTP2GO_PASSWORD:-}
      SMTP2GO_API_KEY: ${SMTP2GO_API_KEY:-}
      SMTP2GO_WEBHOOK_SECRET: ${SMTP2GO_WEBHOOK_SECRET:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      # Mailcow (only needed when modules.mailcow.enabled = true)
      MAILCOW_API_KEY: ${MAILCOW_API_KEY:-}
      MAILCOW_SMTP_USER: ${MAILCOW_SMTP_USER:-}
      MAILCOW_SMTP_PASSWORD: ${MAILCOW_SMTP_PASSWORD:-}
      MAILCOW_IMAP_USER: ${MAILCOW_IMAP_USER:-}
      MAILCOW_IMAP_PASSWORD: ${MAILCOW_IMAP_PASSWORD:-}
      # Energy ingest shared secret
      SAM_ENERGIE_INGEST_KEY: ${SAM_ENERGIE_INGEST_KEY:?SAM_ENERGIE_INGEST_KEY must be set}
      # CardDAV
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
      # OIDC
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      - ./tenant.config.json:/etc/sam/tenant.config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sam_postgres_data:
